[project]
name = "qdag"
version = "0.1.0"
description = "CLI-first reproducible experiment registry client"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cryptography>=49.0.0",
    "detect-secrets>=1.5.0",
    "httpx>=0.28.1",
    "jsonschema>=4.26.0",
    "keyring>=25.7.0",
    "platformdirs>=4.10.0",
    "pydantic>=2.13.4",
    "rich>=15.0.0",
    "typer>=0.26.8",
]

[project.scripts]
qdag = "qdag:main"

[build-system]
requires = ["uv_build>=0.9.26,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=2.2.0",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "respx>=0.23.1",
    "ruff>=0.15.21",
    "types-jsonschema>=4.26.0.20260518",
]

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".venv"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "RUF", "UP", "W"]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["qdag"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
pretty = true
show_error_codes = true
ignore_missing_imports = true
exclude = ["\\.venv/"]

[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]
markers = [
    "integration: end-to-end tests spanning multiple qdag components",
]
