name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:web
      - run: npm run build

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --project packages/cli --all-groups
      - run: npm run contracts:check
      - run: uv run --project packages/cli ruff check packages/cli
      - run: uv run --project packages/cli mypy packages/cli/src
      - run: uv run --project packages/cli pytest

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npx --yes supabase@latest start
      - run: npx --yes supabase@latest db reset
      - run: npx --yes supabase@latest test db
